# Agent-Planet 发布构建工作流
# 推送 v* 标签时自动构建跨平台产物并创建 GitHub Release
name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: '发布版本号 (例如: v1.0.0)'
        required: true
        type: string
        default: 'v1.0.0'

jobs:
  # ── 创建 Release（只执行一次）───────────────────────────────────────────────
  create-release:
    name: 创建 Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tag_name: ${{ steps.vars.outputs.TAG_NAME }}
      version: ${{ steps.vars.outputs.VERSION }}
    steps:
      - name: 签出代码
        uses: actions/checkout@v4

      - name: 设置版本标签
        id: vars
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag_name }}"
          else
            TAG="${{ github.ref_name }}"
          fi
          VERSION="${TAG#v}"
          echo "TAG_NAME=$TAG" >> "$GITHUB_OUTPUT"
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"

      - name: 创建 GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          TAG="${{ steps.vars.outputs.TAG_NAME }}"
          gh release create "$TAG" --title "agentplanet $TAG" \
            --notes "正在构建所有平台安装包，请稍候..." \
            --draft=false --prerelease=false 2>/dev/null || echo "Release 已存在"

  # ── 跨平台构建 job ─────────────────────────────────────────────────────────
  build:
    name: 构建 (${{ matrix.platform.name }})
    needs: create-release
    runs-on: ${{ matrix.platform.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: macOS (Apple Silicon)
            os: macos-latest
            args: --target aarch64-apple-darwin
            rust_target: aarch64-apple-darwin
          - name: macOS (Intel)
            os: macos-latest
            args: --target x86_64-apple-darwin
            rust_target: x86_64-apple-darwin
          - name: Windows (x64)
            os: windows-latest
            args: ""
            rust_target: ""
          - name: Windows (x64) 完整包
            os: windows-latest
            args: ""
            rust_target: ""

    steps:
      - name: 签出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 配置 Git 安全目录
        shell: bash
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: 设置版本标签
        id: vars
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "TAG_NAME=${{ github.event.inputs.tag_name }}" >> "$GITHUB_ENV"
          else
            echo "TAG_NAME=${{ github.ref_name }}" >> "$GITHUB_ENV"
          fi

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: 安装前端依赖
        shell: bash
        run: npm ci

      - name: 同步版本号到构建产物
        shell: bash
        run: |
          VERSION="${TAG_NAME#v}"
          node scripts/sync-version.js "$VERSION"

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform.rust_target }}

      - name: Rust 编译缓存
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      # ── macOS 构建（Apple Silicon / Intel）────────────────────────────────
      - name: 构建 Tauri 应用 (macOS)
        if: runner.os == 'macOS' && matrix.platform.name != 'Windows (x64) 完整包'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="${TAG_NAME#v}"
          echo "=== 开始构建 macOS: ${{ matrix.platform.args }} ==="
          echo "Node: $(node -v), npm: $(npm -v)"
          echo "Rust: $(rustc -V)"
          echo "Cargo: $(cargo -V)"

          # 先单独跑前端构建确认正常
          echo "=== 前端构建 ==="
          npm run build
          echo "=== dist 目录 ==="
          ls -la dist/ | head -20
          echo "dist 文件数: $(find dist -type f | wc -l)"

          # 构建 Tauri
          echo "=== Tauri 构建 ==="
          npm run tauri build -- ${{ matrix.platform.args }}

          # 上传产物
          echo "=== 上传产物 ==="
          if [[ "${{ matrix.platform.args }}" == *"aarch64"* ]]; then
            DMG="src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/Agent-Planet_${VERSION}_aarch64.dmg"
          else
            DMG="src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/Agent-Planet_${VERSION}_x64.dmg"
          fi
          echo "DMG 路径: $DMG"
          ls -la "$DMG" || (echo "DMG 不存在!" && find src-tauri/target -name "*.dmg" 2>/dev/null && exit 1)
          gh release upload "$TAG_NAME" "$DMG" --clobber
          echo "✅ macOS 构建完成"

      # ── Windows 标准构建 ──────────────────────────────────────────────────
      - name: 构建 Tauri 应用 (Windows)
        if: runner.os == 'Windows' && matrix.platform.name == 'Windows (x64)'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="${TAG_NAME#v}"
          echo "=== 开始构建 Windows (x64) ==="
          echo "Node: $(node -v), npm: $(npm -v)"
          echo "Rust: $(rustc -V)"

          echo "=== 前端构建 ==="
          npm run build

          echo "=== Tauri 构建 ==="
          npm run tauri build

          echo "=== 上传产物 ==="
          BUNDLE="src-tauri/target/release/bundle"
          ls -la "${BUNDLE}/nsis/" || (echo "NSIS 目录不存在!" && find src-tauri/target -name "*.exe" -o -name "*.msi" 2>/dev/null && exit 1)

          gh release upload "$TAG_NAME" \
            "${BUNDLE}/nsis/Agent-Planet_${VERSION}_x64-setup.exe" \
            "${BUNDLE}/msi/Agent-Planet_${VERSION}_x64_en-US.msi" --clobber
          echo "✅ Windows 构建完成"

      # ── Windows 完整包（内嵌 WebView2 离线安装器）────────────────────────
      - name: 构建 Tauri 应用 (Windows 完整包)
        if: runner.os == 'Windows' && matrix.platform.name == 'Windows (x64) 完整包'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="${TAG_NAME#v}"
          echo "=== 配置 WebView2 离线安装器 ==="
          node -e "
            const fs = require('fs');
            const f = 'src-tauri/tauri.conf.json';
            const c = JSON.parse(fs.readFileSync(f, 'utf8'));
            c.bundle.windows.webviewInstallMode = { type: 'offlineInstaller', silent: true };
            fs.writeFileSync(f, JSON.stringify(c, null, 2));
          "

          echo "=== 前端构建 ==="
          npm run build

          echo "=== Tauri 构建 ==="
          npm run tauri build

          echo "=== 上传产物 ==="
          BUNDLE="src-tauri/target/release/bundle"

          # 重命名 + 上传 NSIS
          cp "${BUNDLE}/nsis/Agent-Planet_${VERSION}_x64-setup.exe" \
             "${BUNDLE}/nsis/Agent-Planet_${VERSION}_x64-setup-full.exe"
          gh release upload "$TAG_NAME" \
             "${BUNDLE}/nsis/Agent-Planet_${VERSION}_x64-setup-full.exe" --clobber

          # 重命名 + 上传 MSI
          cp "${BUNDLE}/msi/Agent-Planet_${VERSION}_x64_en-US.msi" \
             "${BUNDLE}/msi/Agent-Planet_${VERSION}_x64-full_en-US.msi"
          gh release upload "$TAG_NAME" \
             "${BUNDLE}/msi/Agent-Planet_${VERSION}_x64-full_en-US.msi" --clobber
          echo "✅ Windows 完整包构建完成"

  # ── 所有平台构建完成后，统一更新 Release Notes ─────────────────────────
  update-release-notes:
    name: 更新 Release Notes
    needs: build
    runs-on: ubuntu-latest
    if: always() && needs.build.result != 'cancelled'
    permissions:
      contents: write

    steps:
      - name: 签出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 配置 Git 安全目录
        shell: bash
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: 设置版本标签
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "TAG_NAME=${{ github.event.inputs.tag_name }}" >> "$GITHUB_ENV"
          else
            echo "TAG_NAME=${{ github.ref_name }}" >> "$GITHUB_ENV"
          fi

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: 构建前端并上传热更新包
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="${TAG_NAME#v}"

          npm ci
          npm run build

          cd dist
          zip -r "../web-${VERSION}.zip" .
          cd ..

          HASH=$(sha256sum "web-${VERSION}.zip" | cut -d' ' -f1)
          SIZE=$(stat -c%s "web-${VERSION}.zip")

          gh release upload "$TAG_NAME" "web-${VERSION}.zip" --clobber

          MIN_APP_VER=$(cat docs/update/latest.json 2>/dev/null | python3 -c "import sys,json; print(json.load(sys.stdin).get('minAppVersion','0.9.0'))" 2>/dev/null || echo "0.9.0")

          DL_URL="https://github.com/${{ github.repository }}/releases/download/${TAG_NAME}/web-${VERSION}.zip"
          cat > docs/update/latest.json << JSONEOF
          {
            "version": "${VERSION}",
            "minAppVersion": "${MIN_APP_VER}",
            "hash": "sha256:${HASH}",
            "url": "${DL_URL}",
            "size": ${SIZE},
            "changelog": "",
            "releasedAt": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          JSONEOF
          sed -i 's/^          //' docs/update/latest.json

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/update/latest.json
          git commit -m "ci: update latest.json for ${TAG_NAME}" || true
          git push origin HEAD:main || true

      - name: 生成并更新 Release Notes
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BUILD_RESULT: ${{ needs.build.result }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          VERSION="${TAG_NAME#v}"
          DL="https://github.com/${REPO}/releases/download/${TAG_NAME}"

          PREV_TAG=$(git tag --sort=-v:refname | grep -E '^v' | sed -n '2p' || echo "")
          if [ -n "$PREV_TAG" ]; then
            RANGE="${PREV_TAG}..HEAD"
            CHANGELOG_HEADER="自 ${PREV_TAG} 以来的变更"
          else
            RANGE=""
            CHANGELOG_HEADER="主要变更"
          fi

          get_logs() {
            local prefix="$1"
            if [ -n "$RANGE" ]; then
              git log "$RANGE" --pretty=format:"%s" --no-merges | { grep -iE "^${prefix}" || true; } | sed "s/^${prefix}[:(] */- /" | head -20
            else
              git log --pretty=format:"%s" --no-merges -30 | { grep -iE "^${prefix}" || true; } | sed "s/^${prefix}[:(] */- /" | head -20
            fi
          }

          FEATS=$(get_logs "feat")
          FIXES=$(get_logs "fix")
          OTHERS=$(
            if [ -n "$RANGE" ]; then
              git log "$RANGE" --pretty=format:"%s" --no-merges | { grep -ivE "^(feat|fix|style|chore|ci|docs|test|build)" || true; } | sed 's/^/- /' | head -10
            else
              git log --pretty=format:"%s" --no-merges -30 | { grep -ivE "^(feat|fix|style|chore|ci|docs|test|build)" || true; } | sed 's/^/- /' | head -10
            fi
          )

          CHANGELOG_BODY=""
          if [ -n "$FEATS" ]; then
            CHANGELOG_BODY="${CHANGELOG_BODY}"$'\n### ✨ 新功能\n'"${FEATS}"$'\n'
          fi
          if [ -n "$FIXES" ]; then
            CHANGELOG_BODY="${CHANGELOG_BODY}"$'\n### 🐛 修复\n'"${FIXES}"$'\n'
          fi
          if [ -n "$OTHERS" ]; then
            CHANGELOG_BODY="${CHANGELOG_BODY}"$'\n### 📦 其他\n'"${OTHERS}"$'\n'
          fi
          if [ -z "$CHANGELOG_BODY" ]; then
            CHANGELOG_BODY=$'\n- 常规更新与优化\n'
          fi

          if [ "$BUILD_RESULT" = "success" ]; then
            STATUS_BADGE="✅ 全部平台构建成功"
          else
            STATUS_BADGE="⚠️ 部分平台构建失败，请查看 [Actions 日志](https://github.com/${REPO}/actions)"
          fi

          {
            echo "${STATUS_BADGE}"
            echo ""
            echo "## 📥 下载安装"
            echo ""
            echo "根据你的操作系统选择对应安装包，点击文件名即可下载："
            echo ""
            echo "### macOS"
            echo "| 芯片 | 安装包 |"
            echo "|------|--------|"
            echo "| Apple Silicon (M1/M2/M3/M4) | [Agent-Planet_${VERSION}_aarch64.dmg](${DL}/Agent-Planet_${VERSION}_aarch64.dmg) |"
            echo "| Intel | [Agent-Planet_${VERSION}_x64.dmg](${DL}/Agent-Planet_${VERSION}_x64.dmg) |"
            echo ""
            echo '> **⚠️ 首次打开提示"无法验证开发者"？** 在终端执行：`sudo xattr -rd com.apple.quarantine /Applications/Agent-Planet.app`，或前往 **系统设置 → 隐私与安全性** 点击「仍要打开」。'
            echo ""
            echo "### Windows"
            echo "| 格式 | 安装包 | 说明 |"
            echo "|------|--------|------|"
            echo "| EXE 安装器（推荐） | [Agent-Planet_${VERSION}_x64-setup.exe](${DL}/Agent-Planet_${VERSION}_x64-setup.exe) | 轻量版 ~10 MB |"
            echo "| EXE 完整包 | [Agent-Planet_${VERSION}_x64-setup-full.exe](${DL}/Agent-Planet_${VERSION}_x64-setup-full.exe) | 含 WebView2 ~200 MB |"
            echo "| MSI 安装器 | [Agent-Planet_${VERSION}_x64_en-US.msi](${DL}/Agent-Planet_${VERSION}_x64_en-US.msi) | 轻量版 ~10 MB |"
            echo "| MSI 完整包 | [Agent-Planet_${VERSION}_x64-full_en-US.msi](${DL}/Agent-Planet_${VERSION}_x64-full_en-US.msi) | 含 WebView2 ~200 MB |"
            echo ""
            echo "> **💡 轻量版 vs 完整包**：Win10 1803+ 和 Win11 已预装 WebView2，推荐下载轻量版。如果是内网/断网环境，选择完整包。"
            echo ""
            echo "---"
            echo ""
            echo "## 🚀 首次使用"
            echo ""
            echo "1. 安装并打开 Agent-Planet"
            echo "2. 首次运行会自动检测 Node.js 环境和 OpenClaw CLI"
            echo "3. 如未安装 OpenClaw，按提示一键安装即可"
            echo "4. 安装完成后自动跳转仪表盘，开始使用"
            echo ""
            echo '> **系统要求**：Node.js 18+（推荐 22 LTS）'
            echo ""
            echo "---"
            echo ""
            echo "## ${CHANGELOG_HEADER}"
            echo "${CHANGELOG_BODY}"
            echo "---"
            echo ""
            echo "📖 [项目主页](https://github.com/${REPO}) · 💬 [反馈问题](https://github.com/${REPO}/issues) · 📣 [QQ 群](https://qt.cool/c/OpenClaw)"
          } > release_body.md

          gh release edit "$TAG_NAME" --notes-file release_body.md
