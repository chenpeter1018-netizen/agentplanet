# Agent-Planet 发布构建工作流
# 推送 v* 标签时自动构建跨平台产物并创建 GitHub Release
name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: '发布版本号 (例如: v1.0.0)'
        required: true
        type: string
        default: 'v1.0.0'

jobs:
  # ── 跨平台构建 job ─────────────────────────────────────────────────────────
  build:
    name: 构建 (${{ matrix.platform.name }})
    runs-on: ${{ matrix.platform.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: macOS (Apple Silicon)
            os: macos-latest
            args: --target aarch64-apple-darwin
            rust_target: aarch64-apple-darwin
          - name: macOS (Intel)
            os: macos-latest
            args: --target x86_64-apple-darwin
            rust_target: x86_64-apple-darwin
          - name: Windows (x64)
            os: windows-latest
            args: ""
            rust_target: ""
          - name: Windows (x64) 完整包
            os: windows-latest
            args: ""
            rust_target: ""

    steps:
      - name: 签出代码
        uses: actions/checkout@v4

      - name: 配置 Git 安全目录
        shell: bash
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: 设置版本标签
        id: vars
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag_name }}"
          else
            TAG="${{ github.ref_name }}"
          fi
          echo "TAG_NAME=$TAG" >> "$GITHUB_ENV"
          echo "VERSION=${TAG#v}" >> "$GITHUB_ENV"
          echo "TAG_NAME=$TAG" >> "$GITHUB_OUTPUT"
          echo "VERSION=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: 安装前端依赖
        shell: bash
        run: npm ci

      - name: 前端构建 (独立运行，确认正常)
        shell: bash
        run: |
          echo "=== Node: $(node -v) ==="
          echo "=== npm: $(npm -v) ==="
          npm run build
          echo "=== dist 文件数: $(find dist -type f 2>/dev/null | wc -l) ==="
          ls -la dist/index.html 2>/dev/null || echo "index.html 不存在!"

      - name: 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform.rust_target }}

      - name: Rust 编译 (捕获日志)
        shell: bash
        env:
          RUST_BACKTRACE: full
          CARGO_TERM_VERBOSE: "true"
        run: |
          echo "=== Rust: $(rustc -V) ==="
          echo "=== 系统: $(uname -a) ==="
          echo "=== Git 检查: $(git rev-parse --show-toplevel 2>&1 || echo 'git failed') ==="
          set +e
          cd src-tauri
          cargo build --release ${{ matrix.platform.args }} > /tmp/cargo-build.log 2>&1
          EXIT_CODE=$?
          set -e
          echo "=== cargo build exit code: $EXIT_CODE ==="
          if [ $EXIT_CODE -ne 0 ]; then
            echo "=== 最后 400 行编译日志 ==="
            tail -400 /tmp/cargo-build.log
          fi
          exit $EXIT_CODE

      - name: 上传编译日志 (失败时)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cargo-build-log-${{ matrix.platform.name }}
          path: /tmp/cargo-build.log
          retention-days: 3

      # ── macOS 构建和打包 ──────────────────────────────────────────────────
      - name: macOS Tauri 打包
        if: runner.os == 'macOS'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "=== Tauri 打包开始 ==="
          npm run tauri build -- ${{ matrix.platform.args }}

          echo "=== 查找产物 ==="
          find src-tauri/target -name "*.dmg" 2>/dev/null
          find src-tauri/target -name "*.app" -type d 2>/dev/null | head -5

          echo "=== 创建 Release ==="
          gh release create "$TAG_NAME" --title "agentplanet $TAG_NAME" \
            --notes "正在构建所有平台安装包，请稍候..." 2>/dev/null || echo "Release 已存在"

          echo "=== 上传 DMG ==="
          DMG_FILE=$(find src-tauri/target -name "*.dmg" 2>/dev/null | head -1)
          if [ -n "$DMG_FILE" ]; then
            gh release upload "$TAG_NAME" "$DMG_FILE" --clobber
            echo "已上传: $DMG_FILE"
          else
            echo "错误: 找不到 DMG 文件!"
            exit 1
          fi

      # ── Windows 标准构建 ──────────────────────────────────────────────────
      - name: Windows Tauri 打包
        if: runner.os == 'Windows' && matrix.platform.name != 'Windows (x64) 完整包'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "=== Tauri 打包开始 ==="
          npm run tauri build ${{ matrix.platform.args }}

          echo "=== 创建 Release ==="
          gh release create "$TAG_NAME" --title "agentplanet $TAG_NAME" \
            --notes "正在构建所有平台安装包，请稍候..." 2>/dev/null || echo "Release 已存在"

          echo "=== 上传 Windows 产物 ==="
          BUNDLE="src-tauri/target/release/bundle"
          SETUP_EXE=$(find "$BUNDLE" -name "*_x64-setup.exe" -not -name "*-full*" 2>/dev/null | head -1)
          MSI=$(find "$BUNDLE" -name "*_x64_en-US.msi" -not -name "*-full*" 2>/dev/null | head -1)
          if [ -n "$SETUP_EXE" ] && [ -n "$MSI" ]; then
            gh release upload "$TAG_NAME" "$SETUP_EXE" "$MSI" --clobber
            echo "已上传 Windows 标准包"
          else
            echo "错误: 找不到 Windows 产物!"
            find src-tauri/target -name "*.exe" -o -name "*.msi" 2>/dev/null
            exit 1
          fi

      # ── Windows 完整包 ────────────────────────────────────────────────────
      - name: Windows 完整包 打包
        if: runner.os == 'Windows' && matrix.platform.name == 'Windows (x64) 完整包'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 配置离线 WebView2
          node -e "
            const fs = require('fs');
            const f = 'src-tauri/tauri.conf.json';
            const c = JSON.parse(fs.readFileSync(f, 'utf8'));
            c.bundle.windows.webviewInstallMode = { type: 'offlineInstaller', silent: true };
            fs.writeFileSync(f, JSON.stringify(c, null, 2));
          "

          echo "=== Tauri 打包开始 (完整包) ==="
          npm run tauri build

          BUNDLE="src-tauri/target/release/bundle"

          echo "=== 查找产物并上传完整包 ==="
          SETUP_EXE=$(find "${BUNDLE}/nsis" -name "*_x64-setup.exe" 2>/dev/null | head -1)
          MSI=$(find "${BUNDLE}/msi" -name "*_x64_en-US.msi" 2>/dev/null | head -1)

          if [ -n "$SETUP_EXE" ]; then
            cp "$SETUP_EXE" "${BUNDLE}/nsis/Agent-Planet_${VERSION}_x64-setup-full.exe"
            gh release upload "$TAG_NAME" "${BUNDLE}/nsis/Agent-Planet_${VERSION}_x64-setup-full.exe" --clobber
            echo "已上传 Windows 完整包 EXE"
          fi
          if [ -n "$MSI" ]; then
            cp "$MSI" "${BUNDLE}/msi/Agent-Planet_${VERSION}_x64-full_en-US.msi"
            gh release upload "$TAG_NAME" "${BUNDLE}/msi/Agent-Planet_${VERSION}_x64-full_en-US.msi" --clobber
            echo "已上传 Windows 完整包 MSI"
          fi

  # ── 所有平台构建完成后，统一更新 Release Notes ─────────────────────────
  update-release-notes:
    name: 更新 Release Notes
    needs: build
    runs-on: ubuntu-latest
    if: always() && needs.build.result != 'cancelled'
    permissions:
      contents: write

    steps:
      - name: 签出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 配置 Git 安全目录
        shell: bash
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: 设置版本标签
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "TAG_NAME=${{ github.event.inputs.tag_name }}" >> "$GITHUB_ENV"
          else
            echo "TAG_NAME=${{ github.ref_name }}" >> "$GITHUB_ENV"
          fi

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: 构建前端并上传热更新包
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${TAG_NAME#v}"
          npm ci
          npm run build
          cd dist && zip -r "../web-${VERSION}.zip" . && cd ..

          HASH=$(sha256sum "web-${VERSION}.zip" | cut -d' ' -f1)
          SIZE=$(stat -c%s "web-${VERSION}.zip")

          gh release upload "$TAG_NAME" "web-${VERSION}.zip" --clobber || echo "上传失败，可能 Release 不存在"

          MIN_APP_VER=$(cat docs/update/latest.json 2>/dev/null | python3 -c "import sys,json; print(json.load(sys.stdin).get('minAppVersion','0.9.0'))" 2>/dev/null || echo "0.9.0")
          DL_URL="https://github.com/${{ github.repository }}/releases/download/${TAG_NAME}/web-${VERSION}.zip"
          cat > docs/update/latest.json << JSONEOF
          {
            "version": "${VERSION}",
            "minAppVersion": "${MIN_APP_VER}",
            "hash": "sha256:${HASH}",
            "url": "${DL_URL}",
            "size": ${SIZE},
            "changelog": "",
            "releasedAt": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          JSONEOF
          sed -i 's/^          //' docs/update/latest.json
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/update/latest.json
          git commit -m "ci: update latest.json for ${TAG_NAME}" || true
          git push origin HEAD:main || true

      - name: 生成并更新 Release Notes
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BUILD_RESULT: ${{ needs.build.result }}
          REPO: ${{ github.repository }}
        run: |
          VERSION="${TAG_NAME#v}"
          DL="https://github.com/${REPO}/releases/download/${TAG_NAME}"

          PREV_TAG=$(git tag --sort=-v:refname | grep -E '^v' | sed -n '2p' || echo "")
          [ -n "$PREV_TAG" ] && RANGE="${PREV_TAG}..HEAD" && CHANGELOG_HEADER="自 ${PREV_TAG} 以来的变更" || { RANGE=""; CHANGELOG_HEADER="主要变更"; }

          get_logs() {
            local prefix="$1"
            if [ -n "$RANGE" ]; then
              git log "$RANGE" --pretty=format:"%s" --no-merges | { grep -iE "^${prefix}" || true; } | sed "s/^${prefix}[:(] */- /" | head -20
            else
              git log --pretty=format:"%s" --no-merges -30 | { grep -iE "^${prefix}" || true; } | sed "s/^${prefix}[:(] */- /" | head -20
            fi
          }

          FEATS=$(get_logs "feat")
          FIXES=$(get_logs "fix")
          OTHERS=$(
            if [ -n "$RANGE" ]; then
              git log "$RANGE" --pretty=format:"%s" --no-merges | { grep -ivE "^(feat|fix|style|chore|ci|docs|test|build)" || true; } | sed 's/^/- /' | head -10
            else
              git log --pretty=format:"%s" --no-merges -30 | { grep -ivE "^(feat|fix|style|chore|ci|docs|test|build)" || true; } | sed 's/^/- /' | head -10
            fi
          )

          CHANGELOG_BODY=""
          [ -n "$FEATS" ] && CHANGELOG_BODY="${CHANGELOG_BODY}"$'\n### ✨ 新功能\n'"${FEATS}"$'\n'
          [ -n "$FIXES" ] && CHANGELOG_BODY="${CHANGELOG_BODY}"$'\n### 🐛 修复\n'"${FIXES}"$'\n'
          [ -n "$OTHERS" ] && CHANGELOG_BODY="${CHANGELOG_BODY}"$'\n### 📦 其他\n'"${OTHERS}"$'\n'
          [ -z "$CHANGELOG_BODY" ] && CHANGELOG_BODY=$'\n- 常规更新与优化\n'

          [ "$BUILD_RESULT" = "success" ] && STATUS_BADGE="✅ 全部平台构建成功" || STATUS_BADGE="⚠️ 部分平台构建失败，请查看 [Actions 日志](https://github.com/${REPO}/actions)"

          {
            echo "${STATUS_BADGE}"
            echo ""
            echo "## 📥 下载安装"
            echo ""
            echo "根据你的操作系统选择对应安装包，点击文件名即可下载："
            echo ""
            echo "### macOS"
            echo "| 芯片 | 安装包 |"
            echo "|------|--------|"
            echo "| Apple Silicon (M1/M2/M3/M4) | [Agent-Planet_${VERSION}_aarch64.dmg](${DL}/Agent-Planet_${VERSION}_aarch64.dmg) |"
            echo "| Intel | [Agent-Planet_${VERSION}_x64.dmg](${DL}/Agent-Planet_${VERSION}_x64.dmg) |"
            echo ""
            echo '> **⚠️ 首次打开提示"无法验证开发者"？** 在终端执行：`sudo xattr -rd com.apple.quarantine /Applications/Agent-Planet.app`，或前往 **系统设置 → 隐私与安全性** 点击「仍要打开」。'
            echo ""
            echo "### Windows"
            echo "| 格式 | 安装包 | 说明 |"
            echo "|------|--------|------|"
            echo "| EXE 安装器（推荐） | [Agent-Planet_${VERSION}_x64-setup.exe](${DL}/Agent-Planet_${VERSION}_x64-setup.exe) | 轻量版 ~10 MB |"
            echo "| EXE 完整包 | [Agent-Planet_${VERSION}_x64-setup-full.exe](${DL}/Agent-Planet_${VERSION}_x64-setup-full.exe) | 含 WebView2 ~200 MB |"
            echo "| MSI 安装器 | [Agent-Planet_${VERSION}_x64_en-US.msi](${DL}/Agent-Planet_${VERSION}_x64_en-US.msi) | 轻量版 ~10 MB |"
            echo "| MSI 完整包 | [Agent-Planet_${VERSION}_x64-full_en-US.msi](${DL}/Agent-Planet_${VERSION}_x64-full_en-US.msi) | 含 WebView2 ~200 MB |"
            echo ""
            echo "> **💡 轻量版 vs 完整包**：Win10 1803+ 和 Win11 已预装 WebView2，推荐下载轻量版。如果是内网/断网环境，选择完整包。"
            echo ""
            echo "---"
            echo ""
            echo "## 🚀 首次使用"
            echo ""
            echo "1. 安装并打开 Agent-Planet"
            echo "2. 首次运行会自动检测 Node.js 环境和 OpenClaw CLI"
            echo "3. 如未安装 OpenClaw，按提示一键安装即可"
            echo "4. 安装完成后自动跳转仪表盘，开始使用"
            echo ""
            echo '> **系统要求**：Node.js 18+（推荐 22 LTS）'
            echo ""
            echo "---"
            echo ""
            echo "## ${CHANGELOG_HEADER}"
            echo "${CHANGELOG_BODY}"
            echo "---"
            echo ""
            echo "📖 [项目主页](https://github.com/${REPO}) · 💬 [反馈问题](https://github.com/${REPO}/issues) · 📣 [QQ 群](https://qt.cool/c/OpenClaw)"
          } > release_body.md

          gh release edit "$TAG_NAME" --notes-file release_body.md || echo "更新 Release Notes 失败"
